version: 2

project_name: dingwave

before:
  hooks:
    - sh -c "cd frontend && pnpm install && pnpm build"

builds:
  - id: dingwave
    dir: server
    main: ./main.go
    binary: dingwave
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - '386'
    ignore:
      - goos: darwin
        goarch: '386'
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - format: binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: p1g3
    name: DingWave
  draft: false
  prerelease: auto

changelog:
  sort: desc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
